name: sentry_transport
description: Sentry transport for revere logger. Routes error and fatal log events to Sentry via captureException, and lower-level events as breadcrumbs.
version: 1.0.0

homepage: https://github.com/kumo01GitHub/revere
repository: https://github.com/kumo01GitHub/revere/tree/main/packages/sentry_transport

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  sentry_flutter: ^9.16.0
  revere: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
