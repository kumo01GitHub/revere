name: swift_log_transport
description: SwiftLog (Apple swift-log) transport for revere logger (via platform channel).
version: 0.0.7

homepage: https://github.com/kumo01GitHub/revere
repository: https://github.com/kumo01GitHub/revere/tree/main/packages/swift_log_transport

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  revere: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        sharedDarwinSource: true
        pluginClass: SwiftLogTransportPlugin
      macos:
        sharedDarwinSource: true
        pluginClass: SwiftLogTransportPlugin
