name: android_log_transport_example
description: "Demonstrates how to use the android_log_transport plugin."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  android_log_transport:
    path: ../
  revere: ^2.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
