name: android_log_transport
description: Android Logcat transport for revere logger (via platform channel).
version: 1.1.0

homepage: https://github.com/kumo01GitHub/revere
repository: https://github.com/kumo01GitHub/revere/tree/main/packages/android_log_transport

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  revere: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.kumo01.revere
        pluginClass: AndroidLogTransportPlugin
