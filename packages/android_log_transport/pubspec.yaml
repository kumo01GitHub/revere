name: android_log_transport
version: 0.0.1
publish_to: none
description: Android Logcat transport for revere logger (via platform channel).

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  revere:
    path: ../core
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.kumo01.revere
        pluginClass: AndroidLogTransportPlugin
        dartPluginClass: AndroidLogTransport
