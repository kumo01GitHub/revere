name: CI / Swift Log Transport

on:
  workflow_call:

jobs:
  swift_log_transport:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13, macos-14, macos-15]
    defaults:
      run:
        working-directory: packages/swift_log_transport

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build (dependency resolution)
        run: flutter pub get

      - name: Lint
        run: flutter analyze

      - name: Spec test
        run: flutter test test

      - name: Build example (dependency resolution)
        run: flutter pub get
        working-directory: packages/swift_log_transport/example

      - name: Start iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
import json, sys
devices = json.load(sys.stdin)['devices']
iphones = [d for runtimes in devices.values() for d in runtimes if 'iPhone' in d['name'] and d['isAvailable']]
print(iphones[-1]['udid'])
")
          xcrun simctl boot "$UDID"

      - name: Integration test
        run: flutter test integration_test -d ios
        working-directory: packages/swift_log_transport/example
