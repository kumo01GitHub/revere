name: CI / Notification Transport

on:
  workflow_call:
    inputs:
      run_integration_tests:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      run_integration_tests:
        type: boolean
        default: false
        description: 'Run integration tests'

jobs:
  # ── Android integration tests ────────────────────────────────────────────────
  android_integration_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - api-level: 29
            target: default
            arch: x86_64
          - api-level: 31
            target: google_apis
            arch: x86_64
          - api-level: 33
            target: google_apis
            arch: x86_64
          - api-level: 35
            target: google_apis
            arch: x86_64
    defaults:
      run:
        working-directory: packages/notification_transport

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Build (dependency resolution)
        run: flutter pub get

      - name: Lint
        run: flutter analyze

      - name: Spec test
        run: flutter test test

      - name: Build example (dependency resolution)
        if: inputs.run_integration_tests
        run: flutter pub get
        working-directory: packages/notification_transport/example

      - name: Enable KVM
        if: inputs.run_integration_tests
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Integration test
        if: inputs.run_integration_tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          script: cd packages/notification_transport/example && flutter test integration_test

  # ── iOS / macOS integration tests ────────────────────────────────────────────
  darwin_integration_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: ios
            ios-version: "17"
          - os: macos-15
            platform: ios
            ios-version: "18"
          - os: macos-26
            platform: ios
            ios-version: "26"
          - os: macos-14
            platform: macos
          - os: macos-15
            platform: macos
          - os: macos-26
            platform: macos
    defaults:
      run:
        working-directory: packages/notification_transport

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Build (dependency resolution)
        run: flutter pub get

      - name: Lint
        run: flutter analyze

      - name: Spec test
        run: flutter test test

      - name: Build example (dependency resolution)
        if: inputs.run_integration_tests
        run: flutter pub get
        working-directory: packages/notification_transport/example

      - name: Set up iOS Simulator
        if: inputs.run_integration_tests && matrix.platform == 'ios'
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "import json,sys; devices=json.load(sys.stdin)['devices']; iphones=[d for rt,ds in devices.items() for d in ds if 'iPhone' in d['name'] and d['isAvailable'] and '${{ matrix.ios-version }}' in rt]; print(iphones[-1]['udid'])")
          xcrun simctl boot "$UDID"
          echo "DEVICE=$UDID" >> $GITHUB_ENV

      - name: Set up macOS device
        if: inputs.run_integration_tests && matrix.platform == 'macos'
        run: echo "DEVICE=macos" >> $GITHUB_ENV

      - name: Integration test
        if: inputs.run_integration_tests
        run: flutter test integration_test -d "$DEVICE"
        working-directory: packages/notification_transport/example

  # ── Linux integration tests ──────────────────────────────────────────────────
  linux_integration_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/notification_transport

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build cmake clang pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libglib2.0-dev libnotify-dev \
            xvfb dbus-x11 dunst

      - name: Build (dependency resolution)
        run: flutter pub get

      - name: Lint
        run: flutter analyze

      - name: Spec test
        run: flutter test test

      - name: Build example (dependency resolution)
        if: inputs.run_integration_tests
        run: flutter pub get
        working-directory: packages/notification_transport/example

      - name: Integration test
        if: inputs.run_integration_tests
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          eval $(dbus-launch --sh-syntax)
          dunst &
          sleep 1
          flutter test integration_test -d linux
        working-directory: packages/notification_transport/example

  # ── Windows integration tests ─────────────────────────────────────────────────
  windows_integration_test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/notification_transport

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Build (dependency resolution)
        run: flutter pub get

      - name: Lint
        run: flutter analyze

      - name: Spec test
        run: flutter test test

      - name: Build example (dependency resolution)
        if: inputs.run_integration_tests
        run: flutter pub get
        working-directory: packages/notification_transport/example

      - name: Integration test
        if: inputs.run_integration_tests
        run: flutter test integration_test -d windows
        working-directory: packages/notification_transport/example
