name: Publish

on:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev
      contents: write # Required to create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - name: Resolve package directory
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$TAG" in
            core-v*)                   DIR="packages/core" ;;
            flutter-extension-v*)      DIR="packages/flutter_extension" ;;
            file-transport-v*)         DIR="packages/file_transport" ;;
            websocket-transport-v*)    DIR="packages/websocket_transport" ;;
            firebase-transport-v*)     DIR="packages/firebase_transport" ;;
            android-log-transport-v*)  DIR="packages/android_log_transport" ;;
            swift-log-transport-v*)    DIR="packages/swift_log_transport" ;;
            notification-transport-v*) DIR="packages/notification_transport" ;;
            sentry-transport-v*)       DIR="packages/sentry_transport" ;;
            *) echo "Unknown tag pattern: $TAG" && exit 1 ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: ${{ steps.meta.outputs.dir }}
        run: flutter pub get

      - name: Analyze
        working-directory: ${{ steps.meta.outputs.dir }}
        run: flutter analyze

      - name: Test
        working-directory: ${{ steps.meta.outputs.dir }}
        run: flutter test

      - name: Verify (dry-run)
        working-directory: ${{ steps.meta.outputs.dir }}
        run: flutter pub publish --dry-run

      - name: Set up Dart
        uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1

      - name: Publish to pub.dev
        working-directory: ${{ steps.meta.outputs.dir }}
        run: dart pub publish --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --repo "${{ github.repository }}"
